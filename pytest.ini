[pytest]
# Test discovery settings
testpaths = tests
python_files = test_*.py
python_functions = test_*

# Enable asyncio mode for async test support
asyncio_mode = auto

# Minimum code coverage threshold (60% as required)
addopts =
    -v
    --tb=short
    --cov=app
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=60
