server:
  port: 10004

spring:
  application:
    name: air-quality-monitoring-dashboard
  datasource:
    url: jdbc:postgresql://localhost:5432/air_quality_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

jwt:
  secret: change-this-secret-key-in-production-must-be-at-least-32-characters-long
  expiration: 86400000

cors:
  allowed-origins: http://localhost:10005,http://localhost:5173,http://localhost:3000,http://127.0.0.1:10005
