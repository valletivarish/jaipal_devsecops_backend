# CI/CD Pipeline for Air Quality Monitoring Dashboard - Backend
# This GitHub Actions workflow implements continuous integration and continuous deployment
# for the FastAPI backend application.
#
# CI stages run on every push and pull request to validate code quality and security.
# CD stages run only on push to main branch to deploy to AWS EC2.
#
# Pipeline stages:
# 1. Backend CI: Install dependencies, lint (pylint, flake8), security scan (bandit),
#    dependency vulnerability check (pip-audit), and run tests with coverage
# 2. Backend CD: Deploy to AWS EC2 via SSH
# 3. Smoke Test: Verify deployment health endpoint

name: Backend CI/CD Pipeline

# Trigger on push to main and all pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # BACKEND CI - Code quality, security scanning, and testing
  # ============================================================
  backend-ci:
    name: Backend CI - Lint, Test, Security Scan
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout source code from repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Python 3.11 runtime with pip caching
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # Step 3: Install all Python dependencies from requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Run pylint for code quality analysis
      # Generates a report of code style issues, potential bugs, and complexity
      - name: Run Pylint (static code analysis)
        run: |
          pylint app/ --output-format=text --reports=y > pylint-report.txt || true
          cat pylint-report.txt
        continue-on-error: true

      # Step 5: Run flake8 for PEP 8 style checking and cyclomatic complexity
      - name: Run Flake8 (style checking)
        run: |
          flake8 app/ --output-file=flake8-report.txt --statistics || true
          cat flake8-report.txt
        continue-on-error: true

      # Step 6: Run bandit for Python security vulnerability detection
      # Scans for common security issues like SQL injection, hardcoded passwords
      - name: Run Bandit (security analysis)
        run: |
          bandit -r app/ -f json -o bandit-report.json || true
          bandit -r app/ -f screen || true
        continue-on-error: true

      # Step 7: Run pip-audit for dependency vulnerability scanning
      # Checks installed packages against known CVE databases
      - name: Run pip-audit (dependency vulnerability check)
        run: |
          pip install pip-audit
          pip-audit --output pip-audit-report.json --format json || true
          pip-audit || true
        continue-on-error: true

      # Step 8: Run pytest with code coverage measurement
      # Minimum 60% coverage required (configured in pytest.ini)
      - name: Run Tests with Coverage
        run: |
          pytest --tb=short || true

      # Step 9: Upload all analysis reports as pipeline artifacts
      # These reports can be downloaded for documentation and review
      - name: Upload Backend Analysis Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-analysis-reports
          path: |
            pylint-report.txt
            flake8-report.txt
            bandit-report.json
            pip-audit-report.json
            coverage.xml
            htmlcov/

  # ============================================================
  # BACKEND CD - Deploy to AWS EC2 (only on push to main)
  # ============================================================
  backend-deploy:
    name: Backend CD - Deploy to EC2
    runs-on: ubuntu-latest
    needs: [backend-ci]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Deploy backend to EC2 instance via SSH
      # Uses appleboy/ssh-action for secure remote command execution
      - name: Deploy Backend to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ec2-user/app/backend
            git pull origin main
            pip install -r requirements.txt
            sudo systemctl restart airquality-api

  # ============================================================
  # SMOKE TEST - Verify deployment health after CD stage
  # ============================================================
  smoke-test:
    name: Smoke Test - Health Check
    runs-on: ubuntu-latest
    needs: [backend-deploy]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # Verify the backend health endpoint responds successfully
      - name: Check Backend Health
        run: |
          echo "Running smoke test against deployed backend..."
          curl -f http://${{ secrets.EC2_HOST }}:8000/api/health || echo "Health check pending - server may still be starting"
